name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  lint:
    name: Ruff lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Ruff
        run: pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format (check only)
        run: ruff format --check .

      - name: Verify requirements.lock is current
        run: |
          pip install pip-tools==7.4.1
          python scripts/compile_requirements.py
          git diff --exit-code requirements.lock

  test:
    name: Pytest (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Pytest (exclude integration)
        env:
          NCE_MASTER_KEY: ci-test-master-key-32chars-minimum!!
          DROPBOX_APP_SECRET: test-dropbox-secret
          GRAPH_CLIENT_STATE: test-graph-state
          DRIVE_CHANNEL_TOKEN: test-drive-token
        run: pytest tests/ -m "not integration" -q --tb=short

      - name: Empty with-block gate
        run: python scripts/check_empty_with.py

  security:
    name: Security & IaC validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit==1.8.3 pip-audit==2.9.0

      - name: Bandit (high severity)
        run: bandit -r trimcp server.py admin_server.py -ll -q

      - name: pip-audit (requirements)
        run: pip-audit -r requirements.txt --strict --disable-pip

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform validate (GCP)
        working-directory: trimcp-infra/gcp
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform validate (AWS)
        working-directory: trimcp-infra/aws
        run: |
          terraform init -backend=false
          terraform validate

      - name: Docker Compose config validate
        run: docker compose -f docker-compose.yml config --quiet

  integration:
    name: Pytest (integration smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mcp_user
          POSTGRES_PASSWORD: mcp_password
          POSTGRES_DB: memory_meta
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcp_user -d memory_meta"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Apply Postgres schema
        env:
          PG_DSN: postgresql://mcp_user:mcp_password@localhost:5432/memory_meta
        run: python scripts/apply_integration_schema.py

      - name: Integration smoke (RLS, schema, event log, outbox)
        env:
          PG_DSN: postgresql://mcp_user:mcp_password@localhost:5432/memory_meta
          NCE_MASTER_KEY: ci-test-master-key-32chars-minimum!!
          NCE_INTEGRATION_REFRESH_SIGNING_ON_DECRYPT_FAIL: "1"
        run: |
          pytest tests/test_rls_isolation_integration.py \
            tests/test_schema_bootstrap.py \
            tests/test_rls_catalog.py \
            tests/test_outbox_relay.py \
            tests/test_event_log_hardening.py \
            tests/test_worm_registry.py::test_memory_salience_not_in_worm_tables \
            tests/test_worm_registry.py::test_worm_tables_contains_expected_entries \
            -m integration -q --tb=short
