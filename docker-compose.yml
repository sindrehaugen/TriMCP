version: '3.8'

services:
  # 1. Working Memory (Current Data)
  redis:
    image: redis:7-alpine
    container_name: tri-stack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # 2. Semantic Index (What Data is Stored)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tri-stack-postgres
    environment:
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: mcp_password
      POSTGRES_DB: memory_meta
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 3. Episodic Archive (The Complete Data)
  mongodb:
    image: mongo:7.0
    container_name: tri-stack-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # 4. Large Dataset Ingestion (Audiovisual)
  minio:
    image: minio/minio:latest
    container_name: trimcp-minio
    environment:
      MINIO_ROOT_USER: mcp_admin
      MINIO_ROOT_PASSWORD: super_secure_minio_password
    ports:
      - "9002:9000"  # S3 API Port
      - "9003:9001"  # Web Console Port
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # 5. Background Task Worker
  worker:
    image: trimcp-worker
    container_name: tri-stack-worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://mcp_user:mcp_password@postgres:5432/memory_meta
      - MONGO_URL=mongodb://mongodb:27017
    depends_on:
      - redis
      - postgres
      - mongodb
    restart: unless-stopped

  # 6. Webhook Receiver
  webhook-receiver:
    image: trimcp-webhooks
    container_name: tri-stack-webhook-receiver
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    # Exposes 8080 internally for Caddy to proxy to

  # 7. Reverse Proxy (TLS & Routing)
  caddy:
    image: caddy:2
    container_name: tri-stack-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - webhook-receiver
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
  mongo_data:
  minio_data:
  caddy_data:
  caddy_config:
