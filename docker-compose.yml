# NCE v1.0 — self-hosted stack (Decision D1).
# Zero-config boot: deploy/compose.stack.env + optional deploy/compose.stack.env.generated
# (create via: python scripts/bootstrap-compose-secrets.py — also runs from `make up`).
#
#   docker compose up -d --build
#
# Ports (host): 5432 Postgres, 27017 Mongo, 6379 Redis, 9002 MinIO S3, 9003 MinIO console,
# 11435 cognitive, 8003 Admin UI + REST API, 8004 A2A, 8080 webhooks, 80 Caddy (UI + webhooks).

services:
  redis:
    image: redis:7.4-alpine
    container_name: nce-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: nce-postgres
    # Disk-I/O tuning (VI.5c D1). Larger shared_buffers + maintenance_work_mem
    # speed HNSW index builds; wal_compression + a higher max_wal_size and
    # checkpoint_completion_target=0.9 spread WAL/checkpoint flushes for the
    # write-heavy WORM event_log. synchronous_commit STAYS ON — the WORM log's
    # durability (a committed row is WAL-durable on disk) must NOT be weakened.
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "wal_compression=on"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "synchronous_commit=on"
    environment:
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp_password}
      POSTGRES_DB: memory_meta
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Initialize schema on first boot (idempotent)
      - ./nce/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_user -d memory_meta"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    image: mongo:7.0
    container_name: nce-mongo
    # Disk-I/O tuning (VI.5c D1): zstd block compressor (vs the snappy default)
    # for collection data — transcripts/code/payloads compress well, so this
    # cuts on-disk size and read I/O.
    command:
      - "--wiredTigerCollectionBlockCompressor"
      - "zstd"
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: nce-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  cognitive:
    image: ghcr.io/sindrehaugen/nce-cognitive:v1
    container_name: nce-cognitive
    ports:
      - "${COGNITIVE_PORT:-11435}:11435"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11435/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    # Multicore (VI.5a): scale background indexing/sync across N RQ worker
    # replicas. Lanes (high_priority -> batch_processing -> default) stay as-is;
    # each replica is an independent forking Worker. No container_name so
    # replicas > 1 is allowed (Compose names them nce-worker-1, -2, ...).
    profiles:
      - gpu
    env_file:
      - deploy/compose.stack.env
      - deploy/compose.stack.env.generated
    environment:
      PG_DSN: postgresql://mcp_user:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/memory_meta
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
      # CPU-thread tuning (VI.5a / M2): pin native thread pools to the CPU quota.
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-2}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-false}
      # Disk-I/O tuning (VI.5c D4/D5): extractor temp churn (write temp ->
      # subprocess reads -> unlink) is purely transient data. Point the artifact
      # staging dir AND tempfile's TMPDIR at the RAM-backed tmpfs mount below so
      # those writes never touch real disk.
      NCE_ARTIFACT_STAGING_DIR: ${NCE_ARTIFACT_STAGING_DIR:-/dev/shm/nce-staging}
      TMPDIR: /dev/shm/nce-staging
    tmpfs:
      - /dev/shm/nce-staging
    deploy:
      # N replicas process N RQ jobs concurrently (default 2).
      replicas: ${WORKER_REPLICAS:-2}
      # GPU access for re-embedding CUDA operations (Item 49)
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # APScheduler: bridge subscription renewal + re-embedding sweeps (cognitive maintenance).
  cron:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    command: ["python", "-m", "nce.cron"]
    container_name: nce-cron
    env_file:
      - deploy/compose.stack.env
      - deploy/compose.stack.env.generated
    environment:
      PG_DSN: postgresql://mcp_user:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/memory_meta
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
      # CPU-thread tuning (VI.5a / M2): pin native thread pools to the CPU quota.
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-2}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-false}
      # Disk-I/O tuning (VI.5c D4/D5): RAM-backed temp/staging (see worker).
      NCE_ARTIFACT_STAGING_DIR: ${NCE_ARTIFACT_STAGING_DIR:-/dev/shm/nce-staging}
      TMPDIR: /dev/shm/nce-staging
    tmpfs:
      - /dev/shm/nce-staging
    # Multicore (VI.5a): cron MUST stay a singleton — CronLock is the only
    # split-brain guard. NEVER scale this above 1 replica.
    deploy:
      replicas: 1
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  admin:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    # Multicore (VI.5a): stateless HTTP service — run N uvicorn worker processes.
    # NOT a background-loop process, so --workers is safe (no GC/outbox/re-embed here).
    command:
      [
        "uvicorn",
        "admin_server:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8003",
        "--workers",
        "${ADMIN_WORKERS:-2}",
      ]
    container_name: nce-admin
    env_file:
      - deploy/compose.stack.env
      - deploy/compose.stack.env.generated
    environment:
      PG_DSN: postgresql://mcp_user:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/memory_meta
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
      # CPU-thread tuning (VI.5a / M2): pin native thread pools to the CPU quota.
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-2}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-false}
      # Disk-I/O tuning (VI.5c D4/D5): RAM-backed temp/staging (see worker).
      NCE_ARTIFACT_STAGING_DIR: ${NCE_ARTIFACT_STAGING_DIR:-/dev/shm/nce-staging}
      TMPDIR: /dev/shm/nce-staging
    tmpfs:
      - /dev/shm/nce-staging
    ports:
      - "${ADMIN_PORT:-8003}:8003"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/healthz')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  a2a:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    # Multicore (VI.5a): stateless HTTP service — run N uvicorn worker processes.
    # NOT a background-loop process, so --workers is safe.
    command:
      [
        "uvicorn",
        "nce.a2a_server:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8004",
        "--workers",
        "${A2A_WORKERS:-2}",
      ]
    container_name: nce-a2a
    stop_grace_period: 35s
    env_file:
      - deploy/compose.stack.env
      - deploy/compose.stack.env.generated
    environment:
      PG_DSN: postgresql://mcp_user:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/memory_meta
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
      # CPU-thread tuning (VI.5a / M2): pin native thread pools to the CPU quota.
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-2}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-false}
      # Disk-I/O tuning (VI.5c D4/D5): RAM-backed temp/staging (see worker).
      NCE_ARTIFACT_STAGING_DIR: ${NCE_ARTIFACT_STAGING_DIR:-/dev/shm/nce-staging}
      TMPDIR: /dev/shm/nce-staging
    tmpfs:
      - /dev/shm/nce-staging
    ports:
      - "${A2A_PORT:-8004}:8004"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  webhook-receiver:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    # Multicore (VI.5a): stateless HTTP service — run N uvicorn worker processes.
    # NOT a background-loop process, so --workers is safe.
    command:
      [
        "uvicorn",
        "nce.webhook_receiver.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--workers",
        "${WEBHOOK_WORKERS:-2}",
      ]
    container_name: nce-webhook-receiver
    env_file:
      - deploy/compose.stack.env
      - deploy/compose.stack.env.generated
    environment:
      REDIS_URL: redis://redis:6379/0
      PG_DSN: postgresql://mcp_user:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/memory_meta
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
      # CPU-thread tuning (VI.5a / M2): pin native thread pools to the CPU quota.
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-2}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-false}
      # Disk-I/O tuning (VI.5c D4/D5): RAM-backed temp/staging (see worker).
      NCE_ARTIFACT_STAGING_DIR: ${NCE_ARTIFACT_STAGING_DIR:-/dev/shm/nce-staging}
      TMPDIR: /dev/shm/nce-staging
    tmpfs:
      - /dev/shm/nce-staging
    ports:
      - "${WEBHOOK_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: nce-jaeger
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    volumes:
      - jaeger_data:/badger
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2.8-alpine
    container_name: nce-caddy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      webhook-receiver:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
  mongo_data:
  minio_data:
  caddy_data:
  jaeger_data:
  caddy_config:
