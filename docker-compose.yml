# TriMCP v1.0 — self-hosted stack (Decision D1).
# Zero-config boot: deploy/compose.stack.env + optional deploy/compose.stack.env.generated
# (create via: python scripts/bootstrap-compose-secrets.py — also runs from `make up`).
#
#   docker compose up -d --build
#
# Ports (host): 5432 Postgres, 27017 Mongo, 6379 Redis, 9002 MinIO S3, 9003 MinIO console,
# 11435 cognitive, 8003 Admin UI + REST API, 8004 A2A, 8080 webhooks, 80 Caddy (UI + webhooks).

services:
  redis:
    image: redis:7.4-alpine
    container_name: tri-stack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: tri-stack-postgres
    environment:
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp_password}
      POSTGRES_DB: memory_meta
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Initialize schema on first boot (idempotent)
      - ./trimcp/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_user -d memory_meta"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: tri-stack-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: trimcp-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  cognitive:
    image: ghcr.io/sindrehaugen/trimcp-cognitive:v1
    container_name: trimcp-cognitive
    ports:
      - "${COGNITIVE_PORT:-11435}:11435"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11435/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    container_name: tri-stack-worker
    env_file:
      - deploy/compose.stack.env
      - deploy/compose.stack.env.generated
    environment:
      PG_DSN: postgresql://mcp_user:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/memory_meta
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
    # GPU access for re-embedding CUDA operations (Item 49)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      cognitive:
        condition: service_healthy
    restart: unless-stopped

  # APScheduler: bridge subscription renewal + re-embedding sweeps (cognitive maintenance).
  cron:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    command: ["python", "-m", "trimcp.cron"]
    container_name: tri-stack-cron
    env_file:
      - deploy/compose.stack.env
      - deploy/compose.stack.env.generated
    environment:
      PG_DSN: postgresql://mcp_user:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/memory_meta
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    command:
      [
        "uvicorn",
        "admin_server:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8003",
      ]
    container_name: tri-stack-admin
    env_file:
      - deploy/compose.stack.env
      - deploy/compose.stack.env.generated
    environment:
      PG_DSN: postgresql://mcp_user:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/memory_meta
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
    ports:
      - "${ADMIN_PORT:-8003}:8003"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/api/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  a2a:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    command:
      [
        "uvicorn",
        "trimcp.a2a_server:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8004",
      ]
    container_name: tri-stack-a2a
    env_file:
      - deploy/compose.stack.env
      - deploy/compose.stack.env.generated
    environment:
      PG_DSN: postgresql://mcp_user:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/memory_meta
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
    ports:
      - "${A2A_PORT:-8004}:8004"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  webhook-receiver:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    command:
      [
        "uvicorn",
        "trimcp.webhook_receiver.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    container_name: tri-stack-webhook-receiver
    env_file:
      - deploy/compose.stack.env
      - deploy/compose.stack.env.generated
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${WEBHOOK_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    container_name: tri-stack-caddy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      webhook-receiver:
        condition: service_healthy
      admin:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
  mongo_data:
  minio_data:
  caddy_data:
  caddy_config:
