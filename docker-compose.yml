# TriMCP v1.0 — self-hosted stack (Decision D1).
# Zero-config boot: uses committed deploy/compose.stack.env + sensible defaults.
#
#   docker compose up -d --build
#
# Ports (host): 5432 Postgres, 27017 Mongo, 6379 Redis, 9002 MinIO S3, 9003 MinIO console,
# 11435 cognitive, 8003 Admin UI + REST API, 8004 A2A, 8080 webhooks, 80 Caddy (UI + webhooks).
#
# MCP (stdio): run on the host against published ports, e.g.
#   PG_DSN=postgresql://mcp_user:mcp_password@127.0.0.1:5432/memory_meta ...
#   python server.py

services:
  redis:
    image: redis:7.4-alpine
    container_name: tri-stack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: tri-stack-postgres
    environment:
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp_password}
      POSTGRES_DB: memory_meta
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_user -d memory_meta"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: tri-stack-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: trimcp-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  cognitive:
    image: ghcr.io/sindrehaugen/trimcp-cognitive:v1
    container_name: trimcp-cognitive
    ports:
      - "${COGNITIVE_PORT:-11435}:11435"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    container_name: tri-stack-worker
    env_file:
      - deploy/compose.stack.env
    environment:
      PG_DSN: postgresql://mcp_user:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/memory_meta
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
      TRIMCP_LLM_PROVIDER: ${TRIMCP_LLM_PROVIDER:-local-cognitive-model}
      TRIMCP_COGNITIVE_BASE_URL: ${TRIMCP_COGNITIVE_BASE_URL:-http://cognitive:11435}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      cognitive:
        condition: service_started
    restart: unless-stopped

  # APScheduler: bridge subscription renewal + re-embedding sweeps (cognitive maintenance).
  cron:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    command: ["python", "-m", "trimcp.cron"]
    container_name: tri-stack-cron
    env_file:
      - deploy/compose.stack.env
    environment:
      PG_DSN: postgresql://mcp_user:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/memory_meta
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
      TRIMCP_LLM_PROVIDER: ${TRIMCP_LLM_PROVIDER:-local-cognitive-model}
      TRIMCP_COGNITIVE_BASE_URL: ${TRIMCP_COGNITIVE_BASE_URL:-http://cognitive:11435}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      cognitive:
        condition: service_started
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    command:
      [
        "uvicorn",
        "admin_server:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8003",
      ]
    container_name: tri-stack-admin
    env_file:
      - deploy/compose.stack.env
    environment:
      PG_DSN: postgresql://mcp_user:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/memory_meta
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
      TRIMCP_LLM_PROVIDER: ${TRIMCP_LLM_PROVIDER:-local-cognitive-model}
      TRIMCP_COGNITIVE_BASE_URL: ${TRIMCP_COGNITIVE_BASE_URL:-http://cognitive:11435}
    ports:
      - "${ADMIN_PORT:-8003}:8003"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      cognitive:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/api/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 50s
    restart: unless-stopped

  a2a:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    command:
      [
        "uvicorn",
        "trimcp.a2a_server:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8004",
      ]
    container_name: tri-stack-a2a
    env_file:
      - deploy/compose.stack.env
    environment:
      PG_DSN: postgresql://mcp_user:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/memory_meta
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcp_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-super_secure_minio_password}
      TRIMCP_LLM_PROVIDER: ${TRIMCP_LLM_PROVIDER:-local-cognitive-model}
      TRIMCP_COGNITIVE_BASE_URL: ${TRIMCP_COGNITIVE_BASE_URL:-http://cognitive:11435}
      TRIMCP_A2A_URL: ${TRIMCP_A2A_URL:-http://localhost:8004}
    ports:
      - "${A2A_PORT:-8004}:8004"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      cognitive:
        condition: service_started
    restart: unless-stopped

  webhook-receiver:
    build:
      context: .
      dockerfile: deploy/multiuser/Dockerfile
    command:
      [
        "uvicorn",
        "trimcp.webhook_receiver.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    container_name: tri-stack-webhook-receiver
    env_file:
      - deploy/compose.stack.env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${WEBHOOK_PORT:-8080}:8080"
    depends_on:
      - redis
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    container_name: tri-stack-caddy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - webhook-receiver
      - admin
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
  mongo_data:
  minio_data:
  caddy_data:
  caddy_config:
