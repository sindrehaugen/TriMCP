version: '3.8'

services:
  # 1. Working Memory (Current Data)
  redis:
    image: redis:7-alpine
    container_name: tri-stack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # 2. Semantic Index (What Data is Stored)
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: tri-stack-postgres
    environment:
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: mcp_password
      POSTGRES_DB: memory_meta
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 3. Episodic Archive (The Complete Data)
  mongodb:
    image: mongo:7.0
    container_name: tri-stack-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # 4. Large Dataset Ingestion (Audiovisual)
  minio:
    image: minio/minio:latest
    container_name: trimcp-minio
    environment:
      MINIO_ROOT_USER: mcp_admin
      MINIO_ROOT_PASSWORD: super_secure_minio_password
    ports:
      - "9002:9000"  # S3 API Port (Changed from 9000)
      - "9003:9001"  # Web Console Port (Changed from 9001)
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
  mongo_data:
  minio_data:
