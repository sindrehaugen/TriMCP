<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriMCP Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans" x-data="adminDashboard()">

    <header class="bg-gray-800 border-b border-gray-700 py-4 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight text-white">TriMCP <span class="text-blue-400">Admin</span></h1>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-gray-400">Auto-refresh: 5s</span>
                <div class="w-3 h-3 rounded-full" :class="isRefreshing ? 'bg-green-500 animate-pulse' : 'bg-gray-500'"></div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 relative">

        <!-- Toasts Container -->
        <div class="fixed top-4 right-4 z-50 flex flex-col space-y-2">
            <template x-for="toast in toasts" :key="toast.id">
                <div class="px-4 py-2 rounded shadow-lg text-white text-sm font-semibold transition-all duration-300"
                     :class="toast.type === 'error' ? 'bg-red-600' : 'bg-green-600'"
                     x-text="toast.msg">
                </div>
            </template>
        </div>

        <!-- Health Status Section -->
        <section class="mb-10">
            <h2 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">Quad-Stack Health Status</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">

                <!-- MongoDB -->
                <div class="bg-gray-800 p-4 rounded-lg shadow border border-gray-700">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-medium text-gray-300">MongoDB</h3>
                        <span class="px-2 py-1 text-xs rounded-full font-bold uppercase" 
                              :class="health.mongo === 'up' ? 'bg-green-900 text-green-300' : (health.mongo === 'loading...' ? 'bg-gray-700' : 'bg-red-900 text-red-300')" 
                              x-text="health.mongo"></span>
                    </div>
                </div>

                <!-- PostgreSQL -->
                <div class="bg-gray-800 p-4 rounded-lg shadow border border-gray-700">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-medium text-gray-300">PostgreSQL</h3>
                        <span class="px-2 py-1 text-xs rounded-full font-bold uppercase" 
                              :class="health.postgres === 'up' ? 'bg-green-900 text-green-300' : (health.postgres === 'loading...' ? 'bg-gray-700' : 'bg-red-900 text-red-300')" 
                              x-text="health.postgres"></span>
                    </div>
                </div>

                <!-- Redis -->
                <div class="bg-gray-800 p-4 rounded-lg shadow border border-gray-700">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-medium text-gray-300">Redis</h3>
                        <span class="px-2 py-1 text-xs rounded-full font-bold uppercase" 
                              :class="health.redis === 'up' ? 'bg-green-900 text-green-300' : (health.redis === 'loading...' ? 'bg-gray-700' : 'bg-red-900 text-red-300')" 
                              x-text="health.redis"></span>
                    </div>
                </div>

                <!-- RQ Queue -->
                <div class="bg-gray-800 p-4 rounded-lg shadow border border-gray-700">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-medium text-gray-300">RQ Queue</h3>
                    </div>
                    <p class="text-sm text-gray-400" x-text="health.rq_queue"></p>
                </div>

            </div>
        </section>

        <!-- Garbage Collector Section -->
        <section class="mb-10">
            <h2 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">Garbage Collector (GC) Control</h2>
            <div class="bg-gray-800 p-6 rounded-lg shadow border border-gray-700 flex flex-col md:flex-row items-center justify-between">
                <div>
                    <p class="text-gray-300 mb-1">Purge orphaned embeddings and MongoDB documents that lack a PostgreSQL reference.</p>
                    <template x-if="gcResult">
                        <p class="text-sm text-green-400 font-medium mt-2">Last Run: Purged <span x-text="gcResult.deleted_docs"></span> docs, <span x-text="gcResult.deleted_nodes"></span> nodes.</p>
                    </template>
                </div>
                <div class="mt-4 md:mt-0">
                    <button type="button" @click="triggerGC" 
                            :disabled="isTriggering"
                            class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-6 rounded shadow transition duration-150 disabled:opacity-50 disabled:cursor-not-allowed flex items-center">
                        <span x-show="!isTriggering">Trigger GC Now</span>
                        <span x-show="isTriggering" class="flex items-center" style="display: none;">
                            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Running...
                        </span>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('adminDashboard', () => ({
                health: {
                    mongo: 'loading...',
                    postgres: 'loading...',
                    redis: 'loading...',
                    rq_queue: 'loading...'
                },
                isRefreshing: false,
                isTriggering: false,
                gcResult: null,
                API_KEY: 'dev-secret-key',
                toasts: [],

                init() {
                    this.fetchHealth();
                    setInterval(() => this.fetchHealth(), 5000);
                },

                addToast(msg, type = 'error') {
                    const id = Date.now();
                    this.toasts.push({ id, msg, type });
                    setTimeout(() => {
                        this.toasts = this.toasts.filter(t => t.id !== id);
                    }, 5000);
                },

                async fetchWithRetry(url, options = {}, retries = 3, backoff = 1000) {
                    options.headers = { ...options.headers, 'Authorization': `Bearer ${this.API_KEY}` };
                    for (let i = 0; i < retries; i++) {
                        try {
                            const response = await fetch(url, options);
                            if (!response.ok) throw new Error(`HTTP ${response.status}`);
                            return response;
                        } catch (err) {
                            if (i === retries - 1) throw err;
                            await new Promise(res => setTimeout(res, backoff * (i + 1)));
                        }
                    }
                },

                async fetchHealth() {
                    this.isRefreshing = true;
                    try {
                        const response = await this.fetchWithRetry('/api/health');
                        this.health = await response.json();
                    } catch (error) {
                        console.error('Error fetching health:', error);
                        this.health = { mongo: 'error', postgres: 'error', redis: 'error', rq_queue: 'error' };
                        this.addToast('Failed to fetch health status', 'error');
                    } finally {
                        setTimeout(() => this.isRefreshing = false, 500); // Visual feedback
                    }
                },

                async triggerGC() {
                    if (this.isTriggering) return;
                    this.isTriggering = true;
                    this.gcResult = null;
                    try {
                        const response = await this.fetchWithRetry('/api/gc/trigger', { method: 'POST' });
                        const data = await response.json();
                        if (data.status === 'success') {
                            this.gcResult = data.result;
                            this.addToast('Garbage Collection completed successfully', 'success');
                        } else {
                            throw new Error(data.message || 'Unknown error');
                        }
                    } catch (error) {
                        console.error('Error triggering GC:', error);
                        this.addToast(`GC Failed: ${error.message}`, 'error');
                    } finally {
                        this.isTriggering = false;
                    }
                }
            }))
        })
    </script>
</body>
</html>
